name: MeshNode
options:
  bundleIdPrefix: com.cactushack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
targets:
  MeshNode:
    type: application
    platform: iOS
    sources:
      - path: MeshNode
        excludes:
          - "Models"
          - "Models/**"
          - "soul.md"
      - path: MeshNode/Models
        type: folder
        buildPhase: resources
      - path: MeshNode/soul.md
        buildPhase: resources
    dependencies:
      - framework: Vendor/cactus-ios.xcframework
        embed: true
        codeSign: true
    info:
      path: MeshNode/Info.plist
      properties:
        CFBundleDisplayName: MeshNode
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSBluetoothAlwaysUsageDescription: "MeshNode uses Bluetooth to communicate with nearby devices in the mesh network."
        NSBluetoothPeripheralUsageDescription: "MeshNode uses Bluetooth to communicate with nearby devices in the mesh network."
        NSMicrophoneUsageDescription: "MeshNode uses the microphone to transcribe voice messages on-device."
        NSLocationWhenInUseUsageDescription: "MeshNode uses your location to share your position with squad members on the map."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
          - bluetooth-le
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.cactushack.MeshNode
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
