<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>MeshNode — Graph Animation</title>
<style>
  html,body{margin:0;padding:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;height:100%;}
  #root{display:grid;place-items:center;min-height:100vh;}
  .stage{display:flex;flex-direction:column;align-items:center;gap:32px;}
  .caption{font-size:30px;font-weight:600;letter-spacing:.3px;text-align:center;}
  .caption .sub{opacity:.55;font-weight:400;margin-left:14px;}
  .label{fill:#fff;font-size:22px;font-weight:600;text-anchor:middle;dominant-baseline:middle;font-family:inherit;}
  .sub-label{fill:#fff;opacity:.5;font-size:13px;text-anchor:middle;font-family:inherit;}
  .controls{position:fixed;bottom:16px;right:16px;display:flex;gap:8px;opacity:.35;}
  .controls button{background:#222;color:#fff;border:1px solid #444;border-radius:6px;padding:6px 10px;font:inherit;font-size:12px;cursor:pointer;}
  .controls button:hover{opacity:1;}
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?deps=react@18.3.1"
  }
}
</script>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, {useState, useEffect} from "react";
import {createRoot} from "react-dom/client";
import {motion, AnimatePresence} from "framer-motion";

const h = React.createElement;

// Node positions (diamond)
const N = {
  A: {x: 400, y: 90,  label: "A", sub: "HQ"},
  B: {x: 400, y: 310, label: "B", sub: "Platoon"},
  C: {x: 200, y: 520, label: "C", sub: "Fireteam 1"},
  D: {x: 600, y: 520, label: "D", sub: "Fireteam 2"},
};
const R = 42;

function shrink(p1, p2, r1=R, r2=R){
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  const d=Math.hypot(dx,dy);
  const ux=dx/d, uy=dy/d;
  return {x1:p1.x+ux*r1, y1:p1.y+uy*r1, x2:p2.x-ux*r2, y2:p2.y-uy*r2};
}
function offsetPair(p1, p2, amt){
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  const d=Math.hypot(dx,dy);
  const nx=-dy/d, ny=dx/d;
  return [{x:p1.x+nx*amt, y:p1.y+ny*amt}, {x:p2.x+nx*amt, y:p2.y+ny*amt}];
}

// Panel 1 — all 6 pairs, undirected, equal thin white
function Panel1(){
  const pairs = [["A","B"],["A","C"],["A","D"],["B","C"],["B","D"],["C","D"]];
  return h("g", null,
    ...pairs.map(([a,b])=>{
      const s = shrink(N[a], N[b]);
      return h(motion.line, {
        key:`${a}-${b}`,
        x1:s.x1, y1:s.y1, x2:s.x2, y2:s.y2,
        stroke:"#fff", strokeWidth:2, strokeOpacity:0.8, strokeLinecap:"round",
      });
    })
  );
}

// Panel 2 — hierarchy with directed arrows (exact = white solid, summary = green dashed)
function Panel2(){
  const pairs = [
    {a:"A", b:"B", down:"exact",   up:"exact"},
    {a:"B", b:"C", down:"exact",   up:"summary"},
    {a:"B", b:"D", down:"exact",   up:"summary"},
  ];
  const offset = 7;
  const arrow = (from, to, kind, key) => {
    const [p1, p2] = offsetPair(N[from], N[to], offset);
    const s = shrink(p1, p2);
    const isExact = kind==="exact";
    return h(motion.line, {
      key,
      x1:s.x1, y1:s.y1, x2:s.x2, y2:s.y2,
      stroke: isExact ? "#fff" : "#4ade80",
      strokeWidth: isExact ? 2.5 : 2,
      strokeDasharray: isExact ? undefined : "6 5",
      strokeLinecap:"round",
      markerEnd: `url(#${isExact ? "arrow-exact" : "arrow-summary"})`,
    });
  };
  return h("g", null,
    ...pairs.flatMap(({a,b,down,up})=>[
      arrow(a, b, down, `${a}${b}-d`),
      arrow(b, a, up,   `${b}${a}-u`),
    ])
  );
}

// Panel 3 — undirected hierarchy + BFS ring around D (radius = 2 hops)
function Panel3(){
  const pairs = [["A","B"],["B","C"],["B","D"]];
  const d = N.D;
  const far = Math.max(
    Math.hypot(N.A.x-d.x, N.A.y-d.y),
    Math.hypot(N.C.x-d.x, N.C.y-d.y),
  );
  const ringR = far + 55;
  return h("g", null,
    ...pairs.map(([a,b])=>{
      const s = shrink(N[a], N[b]);
      return h(motion.line, {
        key:`${a}-${b}`,
        x1:s.x1, y1:s.y1, x2:s.x2, y2:s.y2,
        stroke:"#fff", strokeWidth:2.5, strokeLinecap:"round",
      });
    }),
    h(motion.circle, {
      key:"ring",
      cx:d.x, cy:d.y, r:ringR,
      fill:"none", stroke:"#60a5fa", strokeWidth:2,
      strokeDasharray:"4 7",
      initial:{pathLength:0, opacity:0},
      animate:{pathLength:1, opacity:0.85},
      exit:{opacity:0},
      transition:{duration:0.7, ease:"easeOut"},
    })
  );
}

// Panel 4 — faded edges only (dots rendered separately over nodes)
function Panel4Under(){
  const pairs = [["A","B"],["B","C"],["B","D"]];
  return h("g", null,
    ...pairs.map(([a,b])=>{
      const s = shrink(N[a], N[b]);
      return h(motion.line, {
        key:`${a}-${b}`,
        x1:s.x1, y1:s.y1, x2:s.x2, y2:s.y2,
        stroke:"#fff", strokeWidth:2, strokeOpacity:0.2, strokeLinecap:"round",
      });
    })
  );
}
function Panel4Over(){
  return h("g", null,
    ...Object.keys(N).map((k, idx)=>{
      const p = N[k];
      return h(motion.circle, {
        key:`dot-${k}`,
        cx:p.x, cy:p.y-16, r:5, fill:"#60a5fa",
        initial:{opacity:0, scale:0.5},
        animate:{opacity:[0.4, 1, 0.4], scale:[0.8, 1.3, 0.8]},
        exit:{opacity:0},
        transition:{duration:1.3, repeat:Infinity, ease:"easeInOut", delay:idx*0.15},
      });
    })
  );
}

function Nodes(){
  return h("g", null,
    ...Object.keys(N).map(k=>{
      const p = N[k];
      return h("g", {key:k},
        h("circle", {cx:p.x, cy:p.y, r:R, fill:"#0a0a0a", stroke:"#fff", strokeWidth:2.5}),
        h("text", {x:p.x, y:p.y, className:"label"}, p.label),
        h("text", {x:p.x, y:p.y+R+22, className:"sub-label"}, p.sub),
      );
    })
  );
}

const panels = [
  {id:1, caption:"Bluetooth mesh.",    sub:"Peer-to-peer.",           Under: Panel1,      Over: null},
  {id:2, caption:"Hierarchy graph.",   sub:"Verbatim vs paraphrased.", Under: Panel2,     Over: null},
  {id:3, caption:"Context window.",    sub:"Undirected BFS.",          Under: Panel3,     Over: null},
  {id:4, caption:"On-device models.",  sub:"No cloud.",                Under: Panel4Under, Over: Panel4Over},
];

const HOLD_MS = 2000;

function App(){
  const [i, setI] = useState(0);
  const [paused, setPaused] = useState(false);
  useEffect(()=>{
    if(paused) return;
    const t = setTimeout(()=>setI((i+1) % panels.length), HOLD_MS);
    return ()=>clearTimeout(t);
  }, [i, paused]);
  const P = panels[i];
  const fade = {duration:0.45};
  return h("div", {className:"stage"},
    h("svg", {width:760, height:620, viewBox:"0 0 800 620"},
      h("defs", null,
        h("marker", {id:"arrow-exact", viewBox:"0 0 10 10", refX:9, refY:5, markerWidth:5, markerHeight:5, orient:"auto"},
          h("path", {d:"M0,0 L10,5 L0,10 Z", fill:"#fff"}),
        ),
        h("marker", {id:"arrow-summary", viewBox:"0 0 10 10", refX:9, refY:5, markerWidth:5, markerHeight:5, orient:"auto"},
          h("path", {d:"M0,0 L10,5 L0,10 Z", fill:"#4ade80"}),
        ),
      ),
      h(AnimatePresence, {mode:"wait"},
        h(motion.g, {
          key:`under-${P.id}`,
          initial:{opacity:0}, animate:{opacity:1}, exit:{opacity:0},
          transition:fade,
        }, h(P.Under)),
      ),
      h(Nodes),
      h(AnimatePresence, {mode:"wait"},
        P.Over ? h(motion.g, {
          key:`over-${P.id}`,
          initial:{opacity:0}, animate:{opacity:1}, exit:{opacity:0},
          transition:fade,
        }, h(P.Over)) : null,
      ),
    ),
    h(AnimatePresence, {mode:"wait"},
      h(motion.div, {
        key:`cap-${P.id}`,
        className:"caption",
        initial:{opacity:0, y:6}, animate:{opacity:1, y:0}, exit:{opacity:0, y:-6},
        transition:fade,
      }, P.caption, h("span", {className:"sub"}, P.sub)),
    ),
    h("div", {className:"controls"},
      h("button", {onClick:()=>setI((i-1+panels.length)%panels.length)}, "← prev"),
      h("button", {onClick:()=>setPaused(!paused)}, paused ? "▶ play" : "⏸ pause"),
      h("button", {onClick:()=>setI((i+1)%panels.length)}, "next →"),
    ),
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
